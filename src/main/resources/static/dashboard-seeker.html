<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Dashboard - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚀 JobConnect</a>
            <div class="d-flex align-items-center">
                <span id="userNameDisplay" class="me-3 fw-bold text-primary"></span>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-md-3">
                <div class="sidebar mb-4">
                    <h5 class="fw-bold mb-3">Menu</h5>
                    <nav class="nav flex-column">
                        <a class="nav-link active" href="#" onclick="showTab('jobs', this)">Browse Jobs</a>
                        <a class="nav-link" href="#" onclick="showTab('applications', this)">My Applications</a>
                        <a class="nav-link" href="#" onclick="showTab('resume', this)">My Resume</a>
                    </nav>
                </div>
            </div>
            
            <div class="col-md-9">
                <!-- Browse Jobs Tab -->
                <div id="jobsTab" class="tab-content">
                    <h3 class="fw-bold mb-4">Available Jobs</h3>
                    <div class="row g-4" id="seekerJobsList">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>

                <!-- My Applications Tab -->
                <div id="applicationsTab" class="tab-content d-none">
                    <h3 class="fw-bold mb-4">My Applications</h3>
                    <div class="table-responsive glass-panel p-3">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Job ID</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="myApplicationsList">
                                <tr><td colspan="2" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- My Resume Tab -->
                <div id="resumeTab" class="tab-content d-none">
                    <h3 class="fw-bold mb-4">Upload Resume</h3>
                    <div class="glass-panel p-4">
                        <form id="resumeForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted">Select PDF File</label>
                                <input class="form-control" type="file" id="resumeFile" accept=".pdf" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Upload Resume</button>
                        </form>
                        <div id="resumeMessage" class="mt-3"></div>
                        <div id="currentResume" class="mt-4 d-none">
                            <h5 class="fw-bold text-success">✓ Resume Uploaded</h5>
                            <a id="resumeLink" href="#" target="_blank" class="btn btn-outline-primary btn-sm mt-2">View Current Resume</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSeekerDashboard();
        });
        
        function showTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
            document.querySelectorAll('.sidebar .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.remove('d-none');
            element.classList.add('active');
        }
    </script>
</body>
</html>
