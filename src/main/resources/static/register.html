<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚀 JobConnect</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-panel auth-container" style="max-width: 500px;">
            <h2 class="auth-title">Create an Account</h2>
            <div id="registerError" class="alert alert-danger d-none"></div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Full Name</label>
                    <input type="text" class="form-control" id="name" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Email address</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">I am a...</label>
                    <select class="form-select" id="role">
                        <option value="Job Seeker">Job Seeker</option>
                        <option value="Recruiter">Recruiter</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Register</button>
                <div class="text-center mt-3">
                    <span class="text-muted">Already have an account?</span> <a href="login.html" class="text-primary fw-bold text-decoration-none">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
    </script>
</body>
</html>
