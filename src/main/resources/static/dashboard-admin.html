<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚀 JobConnect Admin</a>
            <div class="d-flex align-items-center">
                <span id="userNameDisplay" class="me-3 fw-bold text-danger"></span>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="fw-bold mb-4">System Overview</h2>
        
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="glass-panel p-4 text-center">
                    <h5 class="text-muted fw-bold">Total Users</h5>
                    <h1 class="display-3 fw-bold text-primary" id="totalUsersCount">-</h1>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-panel p-4 text-center">
                    <h5 class="text-muted fw-bold">Total Jobs Posted</h5>
                    <h1 class="display-3 fw-bold text-success" id="totalJobsCount">-</h1>
                </div>
            </div>
        </div>

        <h3 class="fw-bold mb-3">Manage Jobs</h3>
        <div class="table-responsive glass-panel p-3">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Recruiter ID</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminJobsList">
                    <tr><td colspan="5" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdminDashboard();
        });
    </script>
</body>
</html>
